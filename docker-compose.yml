version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
    driver: local

services:

  redis-server:
    image: redis:7-alpine
    container_name: redis-server
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee-web
    restart: unless-stopped
    ports:
      - "8080:3000"
    networks:
      - app-network
    depends_on:
      - redis-server

